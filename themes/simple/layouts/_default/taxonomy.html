{{ define "main" }}
<div class="taxonomy-wrap">
  <h1>{{ .Title }}</h1>
  <div class="post-list">
    {{ range .Pages }}
    <article class="post-card">
      <div class="post-meta">
        <time>{{ .Date.Format "2006-01-02" }}</time>
      </div>
      <h2 class="post-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      {{ with .Description }}<p class="post-desc">{{ . }}</p>{{ end }}
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
