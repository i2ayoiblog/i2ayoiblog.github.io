<header class="site-header">
  <div class="container">
    <div class="header-inner">
      <a class="site-title" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
      {{ with .Site.Params.subtitle }}<p class="site-subtitle">{{ . }}</p>{{ end }}
    </div>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" {{ if eq $.RelPermalink .URL }}class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
    {{ if .Site.Params.search }}
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="搜索文章…" autocomplete="off" />
      <ul id="search-results"></ul>
    </div>
    {{ end }}
  </div>
</header>
