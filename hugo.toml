baseURL = "https://i2ayoiblog.github.io/"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
title = "我的随笔"
theme = "simple"
[pagination]
  pagerSize = 10
enableEmoji = true
enableRobotsTXT = true
disablePathToLower = true

[params]
  description = "想到什么写什么"
  author = "i2ayoi"
  # 首页显示的副标题
  subtitle = "生活 · 学习 · 工作"
  # 开启搜索
  search = true
  # 开启目录（文章内）
  toc = false

[taxonomies]
  category = "categories"
  tag = "tags"

[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "酒"
    url = "/categories/酒品/"
    weight = 2
  [[menu.main]]
    name = "笔记"
    url = "/categories/笔记/"
    weight = 3
  [[menu.main]]
    name = "游戏"
    url = "/categories/游戏/"
    weight = 4
  [[menu.main]]
    name = "随笔"
    url = "/categories/随笔/"
    weight = 5
  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 6
  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 7

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
